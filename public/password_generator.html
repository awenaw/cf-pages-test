<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>密码生成器</title>
  <style>
    :root {
      --bg: #f5f1ec;
      --card: #f7f7f8;
      --panel: #f0eff2;
      --text: #131313;
      --muted: #6f6f76;
      --dark: #2b3138;
      --track: #d3d3d8;
      --green: #b9f0a8;
      --green-deep: #4a9d42;
      --shadow: 0 24px 55px rgba(28, 21, 16, 0.12);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(185, 240, 168, 0.68), transparent 28%),
        radial-gradient(circle at bottom right, rgba(252, 198, 150, 0.42), transparent 24%),
        linear-gradient(160deg, #f5f0ea 0%, #efe7dc 100%);
    }

    .app {
      width: min(100%, 360px);
      background: linear-gradient(180deg, #ffffff 0%, #f6f4f0 100%);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .hero {
      padding: 26px 26px 20px;
      background:
        linear-gradient(180deg, rgba(185, 240, 168, 0.92) 0%, rgba(185, 240, 168, 0.78) 100%),
        linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0));
    }

    .password-row {
      display: flex;
      align-items: start;
      gap: 12px;
    }

    .password-output {
      flex: 1;
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
      letter-spacing: 0.01em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      word-break: break-all;
      min-height: 46px;
    }

    .actions {
      display: flex;
      gap: 10px;
      padding-top: 2px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: rgba(255, 255, 255, 0.28);
      border-radius: 12px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.52);
    }

    .icon-btn svg {
      width: 21px;
      height: 21px;
      stroke: #1f2937;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .strength {
      display: inline-flex;
      align-items: center;
      margin-top: 18px;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.42);
      color: var(--green-deep);
    }

    .panel {
      margin: 18px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: #f1f1f3;
      display: grid;
      gap: 18px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      font-weight: 800;
      font-size: 16px;
    }

    .slider-row label {
      color: #34343a;
    }

    .slider-row output {
      min-width: 28px;
      text-align: right;
      color: #34343a;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--dark) var(--fill, 55%), var(--track) var(--fill, 55%));
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--dark);
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: var(--dark);
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .toggle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .toggle {
      border: none;
      border-radius: 14px;
      padding: 14px 10px;
      background: #ebe9ea;
      color: #4f5359;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .toggle.active {
      background: var(--dark);
      color: #ffffff;
    }

    .toggle:hover {
      transform: translateY(-1px);
    }

    .tips {
      padding: 18px 24px 24px;
      border-top: 1px solid rgba(43, 49, 56, 0.08);
      background: rgba(255, 255, 255, 0.38);
      display: grid;
      gap: 12px;
    }

    .rate-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-weight: 700;
    }

    .stars {
      display: inline-flex;
      gap: 8px;
      color: #ff8e28;
      font-size: 22px;
      line-height: 1;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      margin: 0;
    }

    .copied {
      color: #0f766e;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="password-row">
        <p class="password-output" id="passwordOutput">cKiB20LamfZchLqt7TbA9nV7o</p>
        <div class="actions">
          <button class="icon-btn" id="copyBtn" type="button" aria-label="复制密码">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="11" height="11" rx="2"></rect>
              <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <button class="icon-btn" id="refreshBtn" type="button" aria-label="重新生成">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a8.95 8.95 0 0 1-2.64 6.36A9 9 0 1 1 21 12Z"></path>
              <path d="M21 3v6h-6"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="strength" id="strengthBadge">Strong Password</div>
    </section>

    <section class="panel">
      <div class="slider-row">
        <label for="lengthRange">Length</label>
        <input id="lengthRange" type="range" min="6" max="40" value="25" />
        <output id="lengthValue" for="lengthRange">25</output>
      </div>

      <div class="toggle-grid">
        <button class="toggle active" data-set="letters" type="button">A-Z</button>
        <button class="toggle active" data-set="numbers" type="button">0-9</button>
        <button class="toggle" data-set="symbols" type="button">!@#$%^</button>
      </div>
    </section>

    <section class="tips">
      <div class="rate-row">
        <span>Rate us:</span>
        <span class="stars" aria-hidden="true">☆ ☆ ☆ ☆ ☆</span>
      </div>
      <p class="helper" id="helperText">建议至少开启两组字符并使用 16 位以上长度，密码会在你调整长度或开关时自动重新生成。</p>
    </section>
  </main>

  <script>
    const outputEl = document.getElementById("passwordOutput");
    const strengthEl = document.getElementById("strengthBadge");
    const helperEl = document.getElementById("helperText");
    const rangeEl = document.getElementById("lengthRange");
    const lengthValueEl = document.getElementById("lengthValue");
    const toggles = [...document.querySelectorAll(".toggle")];

    const charsetMap = {
      letters: "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz",
      numbers: "23456789",
      symbols: "!@#$%^&*()-_=+[]{}?"
    };

    const state = {
      letters: true,
      numbers: true,
      symbols: false
    };

    function clampActiveSets(changedKey) {
      const activeCount = Object.values(state).filter(Boolean).length;
      if (activeCount > 0) return;
      state[changedKey] = true;
    }

    function updateSliderFill() {
      const min = Number(rangeEl.min);
      const max = Number(rangeEl.max);
      const current = Number(rangeEl.value);
      const percent = ((current - min) / (max - min)) * 100;
      rangeEl.style.setProperty("--fill", percent + "%");
      lengthValueEl.textContent = current;
    }

    function updateToggleState() {
      toggles.forEach((button) => {
        const key = button.dataset.set;
        button.classList.toggle("active", state[key]);
      });
    }

    function computeStrength(length, activeSets) {
      let score = 0;
      if (length >= 12) score += 1;
      if (length >= 18) score += 1;
      if (length >= 24) score += 1;
      if (activeSets >= 2) score += 1;
      if (activeSets === 3) score += 1;

      if (score <= 2) {
        return {
          label: "Weak Password",
          color: "#a84e1b",
          background: "rgba(255,255,255,0.42)"
        };
      }

      if (score === 3 || score === 4) {
        return {
          label: "Medium Password",
          color: "#916b12",
          background: "rgba(255,255,255,0.45)"
        };
      }

      return {
        label: "Strong Password",
        color: "#4a9d42",
        background: "rgba(255,255,255,0.42)"
      };
    }

    function randomChar(chars) {
      const index = Math.floor(Math.random() * chars.length);
      return chars[index];
    }

    function shuffle(text) {
      const arr = text.split("");
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr.join("");
    }

    function generatePassword() {
      const length = Number(rangeEl.value);
      const activeKeys = Object.keys(state).filter((key) => state[key]);
      const pools = activeKeys.map((key) => charsetMap[key]);

      let password = pools.map((chars) => randomChar(chars)).join("");
      const allChars = pools.join("");

      while (password.length < length) {
        password += randomChar(allChars);
      }

      outputEl.textContent = shuffle(password).slice(0, length);

      const strength = computeStrength(length, activeKeys.length);
      strengthEl.textContent = strength.label;
      strengthEl.style.color = strength.color;
      strengthEl.style.background = strength.background;
      helperEl.classList.remove("copied");
      helperEl.textContent = "建议至少开启两组字符并使用 16 位以上长度，密码会在你调整长度或开关时自动重新生成。";
    }

    rangeEl.addEventListener("input", () => {
      updateSliderFill();
      generatePassword();
    });

    toggles.forEach((button) => {
      button.addEventListener("click", () => {
        const key = button.dataset.set;
        state[key] = !state[key];
        clampActiveSets(key);
        updateToggleState();
        generatePassword();
      });
    });

    document.getElementById("refreshBtn").addEventListener("click", generatePassword);

    document.getElementById("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputEl.textContent);
        helperEl.classList.add("copied");
        helperEl.textContent = "已复制到剪贴板，现在可以直接粘贴使用。";
      } catch (error) {
        helperEl.classList.add("copied");
        helperEl.textContent = "复制失败，请手动选择上方密码。";
      }
    });

    updateSliderFill();
    updateToggleState();
    generatePassword();
  </script>
</body>
</html>
